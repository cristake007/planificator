{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
  <form id="safeUpdaterForm" class="grid grid-cols-1 md:grid-cols-12 gap-4" enctype="multipart/form-data">
    <div class="md:col-span-6">
      <label for="wpBaseUrl" class="block text-sm font-medium mb-2 text-gray-700">WordPress Base URL</label>
      <input type="url" class="py-2.5 px-4 block w-full border-gray-300 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500" id="wpBaseUrl" placeholder="https://tuvkarpat.ro" required>
    </div>
    <div class="md:col-span-3">
      <label for="wpUsername" class="block text-sm font-medium mb-2 text-gray-700">WP Username</label>
      <input type="text" class="py-2.5 px-4 block w-full border-gray-300 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500" id="wpUsername" required>
    </div>
    <div class="md:col-span-3">
      <label for="wpAppPassword" class="block text-sm font-medium mb-2 text-gray-700">Application Password</label>
      <input type="password" class="py-2.5 px-4 block w-full border-gray-300 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500" id="wpAppPassword" required>
    </div>
    <div class="md:col-span-6">
      <label for="excelFile" class="block text-sm font-medium mb-2 text-gray-700">Excel file (.xlsx/.xls)</label>
      <input type="file" class="block w-full rounded-lg text-sm file:me-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 border-2 border-dashed border-blue-300 bg-blue-50/30 focus:border-blue-500 focus:ring-2 focus:ring-blue-200" id="excelFile" accept=".xlsx,.xls" required>
    </div>
    <div class="md:col-span-12">
      <button type="submit" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700" id="previewBtn">Preview rows</button>
    </div>
  </form>

  <div id="previewError" class="rounded-lg border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-700 d-none">Unable to preview rows. Please check your credentials, file format, and required columns.</div>

  <div id="previewContainer" class="space-y-3 d-none">
    <h5 class="text-lg font-semibold text-gray-800">Preview</h5>
    <div class="overflow-x-auto border border-gray-200 rounded-xl">
      <table class="min-w-full divide-y divide-gray-200 text-sm" id="previewTable">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left font-medium text-gray-600">Title</th>
            <th class="px-4 py-3 text-left font-medium text-gray-600">Permalink</th>
            <th class="px-4 py-3 text-left font-medium text-gray-600">Slug</th>
            <th class="px-4 py-3 text-left font-medium text-gray-600">Post ID</th>
            <th class="px-4 py-3 text-left font-medium text-gray-600">Existing valid dates</th>
            <th class="px-4 py-3 text-left font-medium text-gray-600">New dates from Excel</th>
            <th class="px-4 py-3 text-left font-medium text-gray-600">Final merged dates</th>
            <th class="px-4 py-3 text-left font-medium text-gray-600">Status</th>
            <th class="px-4 py-3 text-left font-medium text-gray-600">Update</th>
          </tr>
        </thead>
        <tbody id="previewTableBody" class="divide-y divide-gray-200 bg-white"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/safe_course_date_updater.js') }}"></script>
{% endblock %}
