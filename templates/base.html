<!doctype html>
<html lang="en" class="h-full" data-hs-theme="default">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block title %}{% endblock %}

    <script>
      (function () {
        const storedTheme = localStorage.getItem('hs_theme');
        const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default';
        const activeTheme = storedTheme || preferredTheme;

        document.documentElement.setAttribute('data-hs-theme', activeTheme);
        if (activeTheme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#eff6ff',
                600: '#2563eb',
                700: '#1d4ed8'
              }
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="https://preline.co/assets/css/main.min.css">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body class="h-full bg-base text-base-foreground">
<div class="min-h-full">
  <header class="sticky top-0 z-40 bg-base/90 backdrop-blur border-b border-base-line">
    <div class="px-4 sm:px-5 lg:px-6 py-3 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2">
        <button type="button" class="lg:hidden py-2 px-3 inline-flex justify-center items-center gap-x-2 text-start bg-secondary border border-secondary-line text-secondary-foreground text-sm font-medium rounded-lg shadow-2xs hover:bg-secondary-hover focus:outline-hidden focus:bg-secondary-focus" data-hs-overlay="#app-sidebar" aria-controls="app-sidebar" aria-label="Open navigation">
          <svg class="size-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
        </button>
        <button id="sidebarCollapse" type="button" class="hidden lg:inline-flex py-2 px-3 justify-center items-center gap-x-2 text-start bg-secondary border border-secondary-line text-secondary-foreground text-sm font-medium rounded-lg shadow-2xs hover:bg-secondary-hover focus:outline-hidden focus:bg-secondary-focus" aria-controls="app-sidebar" aria-label="Collapse navigation">
          <svg class="size-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
        </button>
        <h1 class="text-lg font-semibold">Planificator</h1>
      </div>

      <button id="themeToggle" type="button" class="inline-flex items-center gap-2 rounded-md border border-secondary-line px-2.5 py-1.5 text-xs font-medium text-secondary-foreground hover:bg-secondary-hover">
        <svg class="theme-light-icon size-4 hidden dark:inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21m8.25-9H18m-13.5 0H2.25m15.364 6.364-1.591-1.591M7.977 7.977 6.386 6.386m11.228 0-1.591 1.591M7.977 16.023l-1.591 1.591M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
        <svg class="theme-dark-icon size-4 inline-block dark:hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 12 21.75 9.75 9.75 0 0 1 12 2.25a9.716 9.716 0 0 1 9.752 12.752Z"/></svg>
        Theme
      </button>
    </div>
  </header>

  <div class="mx-auto max-w-screen-2xl px-4 sm:px-5 lg:px-6 py-5">
    <div class="lg:grid lg:grid-cols-12 lg:gap-5">
      <aside id="app-sidebar" class="hs-overlay [--auto-close:lg] lg:block lg:translate-x-0 lg:end-auto lg:bottom-0 w-72 lg:w-auto hs-overlay-open:translate-x-0 -translate-x-full transition-all duration-300 transform h-full hidden fixed top-0 start-0 bottom-0 z-[60] bg-sidebar border-e border-sidebar-line lg:relative lg:col-span-3 xl:col-span-2 lg:h-auto" tabindex="-1" role="dialog" aria-label="Sidebar">
        <div class="relative flex flex-col h-full max-h-full p-4 lg:p-0 overflow-y-auto">
          <div class="lg:hidden mb-3 flex items-center justify-between">
            <span class="text-xs font-semibold uppercase tracking-wide text-muted-foreground-2">Navigation</span>
            <button type="button" class="flex justify-center items-center gap-x-3 size-7 bg-layer border border-layer-line text-sm text-muted-foreground-2 hover:bg-layer-hover rounded-full focus:outline-hidden focus:bg-layer-focus" data-hs-overlay="#app-sidebar" aria-label="Close navigation">✕</button>
          </div>

          <nav class="p-1.5 w-full flex flex-col gap-1 bg-sidebar border border-sidebar-line rounded-lg" aria-label="Sidebar">
            <a class="sidebar-link {% if request.endpoint == 'scheduler.generator_perioade' %}sidebar-link-active{% endif %}" href="{{ url_for('scheduler.generator_perioade') }}">Schedule Generator</a>
            <a class="sidebar-link {% if request.endpoint == 'scheduler.xml_formatter' %}sidebar-link-active{% endif %}" href="{{ url_for('scheduler.xml_formatter') }}">Convertor Excel to XML</a>
            <a class="sidebar-link {% if request.endpoint == 'scheduler.word_to_excel' %}sidebar-link-active{% endif %}" href="{{ url_for('scheduler.word_to_excel') }}">Word to Excel</a>
            <a class="sidebar-link {% if request.endpoint == 'scheduler.safe_course_date_updater' %}sidebar-link-active{% endif %}" href="{{ url_for('scheduler.safe_course_date_updater') }}">Safe Course Date Updater</a>
          </nav>
        </div>
      </aside>

      <main id="app-main" class="lg:col-span-9 xl:col-span-10 mt-4 lg:mt-0">
        <div class="content-pattern bg-layer border border-layer-line rounded-lg p-4 sm:p-5">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </div>
</div>

<script src="https://preline.co/assets/js/preline.js"></script>
<script>
  (() => {
    const isCollapsed = localStorage.getItem('sidebar_collapsed') === 'true';
    if (isCollapsed) {
      document.body.classList.add('sidebar-collapsed');
    }
  })();

  document.getElementById('sidebarCollapse')?.addEventListener('click', () => {
    const body = document.body;
    body.classList.toggle('sidebar-collapsed');
    localStorage.setItem('sidebar_collapsed', body.classList.contains('sidebar-collapsed'));
  });

  document.getElementById('themeToggle')?.addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.classList.toggle('dark');
    const themeValue = isDark ? 'dark' : 'default';
    html.setAttribute('data-hs-theme', themeValue);
    localStorage.setItem('hs_theme', themeValue);
  });
</script>
<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
