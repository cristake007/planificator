<!doctype html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block title %}{% endblock %}

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#eff6ff',
                600: '#2563eb',
                700: '#1d4ed8'
              }
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="https://preline.co/assets/css/main.min.css">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body class="h-full">
<div class="min-h-full">
  <header class="bg-white border-b border-gray-200">
    <div class="px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-800">Planificator</h1>
    </div>
  </header>

  <div class="mx-auto max-w-screen-2xl px-4 sm:px-6 lg:px-8 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <aside class="lg:col-span-3 xl:col-span-2">
        <nav class="hs-accordion-group p-2 w-full flex flex-col bg-white border border-gray-200 rounded-xl" data-hs-accordion-always-open>
          <a class="flex items-center gap-x-3.5 py-2 px-2.5 text-sm rounded-lg {% if request.endpoint == 'scheduler.generator_perioade' %}bg-blue-100 text-blue-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}" href="{{ url_for('scheduler.generator_perioade') }}">
            Schedule Generator
          </a>
          <a class="flex items-center gap-x-3.5 py-2 px-2.5 text-sm rounded-lg {% if request.endpoint == 'scheduler.xml_formatter' %}bg-blue-100 text-blue-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}" href="{{ url_for('scheduler.xml_formatter') }}">
            Convertor excel to xml
          </a>
          <a class="flex items-center gap-x-3.5 py-2 px-2.5 text-sm rounded-lg {% if request.endpoint == 'scheduler.word_to_excel' %}bg-blue-100 text-blue-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}" href="{{ url_for('scheduler.word_to_excel') }}">
            Word to Excel
          </a>
          <a class="flex items-center gap-x-3.5 py-2 px-2.5 text-sm rounded-lg {% if request.endpoint == 'scheduler.safe_course_date_updater' %}bg-blue-100 text-blue-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}" href="{{ url_for('scheduler.safe_course_date_updater') }}">
            Safe Course Date Updater
          </a>
        </nav>
      </aside>

      <main class="lg:col-span-9 xl:col-span-10">
        <div class="bg-white border border-gray-200 rounded-xl p-4 sm:p-6">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </div>
</div>

<script src="https://preline.co/assets/js/preline.js"></script>
<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
