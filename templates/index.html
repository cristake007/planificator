{% extends "base.html" %}

{% block title %}<title>Planificator overview</title>{% endblock %}

{% block content %}
<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-semibold text-base-foreground">Legacy entry page</h1>
    <p class="text-sm text-muted-foreground mt-1">This template is kept for compatibility and now follows the unified Preline UI styling.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
    <a href="{{ url_for('scheduler.generator_perioade') }}" class="inline-flex items-center justify-center rounded-md border border-secondary-line bg-secondary px-4 py-2 text-sm font-medium text-secondary-foreground hover:bg-secondary-hover">Schedule Generator</a>
    <a href="{{ url_for('scheduler.xml_formatter') }}" class="inline-flex items-center justify-center rounded-md border border-secondary-line bg-secondary px-4 py-2 text-sm font-medium text-secondary-foreground hover:bg-secondary-hover">Excel to XML</a>
    <a href="{{ url_for('scheduler.word_to_excel') }}" class="inline-flex items-center justify-center rounded-md border border-secondary-line bg-secondary px-4 py-2 text-sm font-medium text-secondary-foreground hover:bg-secondary-hover">Word to Excel</a>
    <a href="{{ url_for('scheduler.safe_course_date_updater') }}" class="inline-flex items-center justify-center rounded-md border border-secondary-line bg-secondary px-4 py-2 text-sm font-medium text-secondary-foreground hover:bg-secondary-hover">Safe Date Updater</a>
  </div>
</div>
{% endblock %}
