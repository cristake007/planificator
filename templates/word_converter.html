{% extends "base.html" %}
{% block title %}<title>Word converter</title>{% endblock %}
{% block content %}
<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-semibold text-gray-800">Word to Excel Course Converter</h1>
    <p class="text-sm text-gray-500 mt-1">Upload a Word file and a permalink source file to generate output.</p>
  </div>

  <form id="convertWordForm" method="POST" enctype="multipart/form-data" action="/convert_word" class="space-y-4">
    <div>
      <label for="wordFile" class="block text-sm font-medium mb-2 text-gray-700">Word File (Courses List)</label>
      <input type="file" class="block w-full border-gray-300 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500" id="wordFile" name="word_file" accept=".docx" required>
    </div>
    <div>
      <label for="permalinksFile" class="block text-sm font-medium mb-2 text-gray-700">Excel File (Permalinks)</label>
      <input type="file" class="block w-full border-gray-300 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500" id="permalinksFile" name="permalinks_file" accept=".xlsx,.xls,.csv" required>
    </div>
    <button type="submit" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700">Convert and Match</button>
  </form>

  <div class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" id="successMessage" role="alert" style="display: none;">
    Excel file has been generated successfully!
  </div>

  <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700" id="errorAlert" style="display: none;" role="alert"></div>
</div>

<div class="fixed inset-0 bg-gray-900/40 z-50 hidden" id="loadingSpinner" style="display: none;">
  <div class="h-full flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 text-center shadow-lg">
      <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-600 rounded-full mb-3"></div>
      <div class="text-sm text-gray-600">Converting to Excel...</div>
    </div>
  </div>
</div>

<script>
    document.getElementById('wordForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevent page refresh
        const formData = new FormData();
        const fileInput = document.getElementById('inputFile').files[0];
        formData.append('input_file', fileInput);

        document.getElementById('loadingSpinner').style.display = 'block';

        try {
            const response = await fetch('/convert_word', {
                method: 'POST',
                body: formData,
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'An unknown error occurred');
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'courses.xlsx';
            a.click();
            window.URL.revokeObjectURL(url); // Clean up URL

            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        } catch (error) {
            document.getElementById('errorAlert').textContent = error.message;
            document.getElementById('errorAlert').style.display = 'block';
        } finally {
            document.getElementById('loadingSpinner').style.display = 'none';
        }
    });
</script>
{% endblock %}
