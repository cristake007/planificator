{% extends "base.html" %}
{% block title %}<title>Word converter</title>{% endblock %}
{% block content %}
<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-semibold text-base-foreground">Word to Excel Course Converter</h1>
    <p class="text-sm text-muted-foreground mt-1">Upload a Word file and a permalink source file to generate output.</p>
  </div>

  <form id="convertWordForm" method="POST" enctype="multipart/form-data" action="/convert_word" class="space-y-4">
    <div>
      <label for="wordFile" class="block text-sm font-medium mb-2 text-base-foreground">Word File (Courses List)</label>
      <input type="file" class="block w-full rounded-lg text-sm file:me-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:font-semibold file:bg-secondary file:text-secondary-foreground hover:file:bg-secondary-hover border-2 border-dashed border-base-line bg-base-200/40 focus:border-primary focus:ring-2 focus:ring-base-line" id="wordFile" name="word_file" accept=".docx" required>
    </div>
    <div>
      <label for="permalinksFile" class="block text-sm font-medium mb-2 text-base-foreground">Excel File (Permalinks)</label>
      <input type="file" class="block w-full rounded-lg text-sm file:me-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:font-semibold file:bg-secondary file:text-secondary-foreground hover:file:bg-secondary-hover border-2 border-dashed border-base-line bg-base-200/40 focus:border-primary focus:ring-2 focus:ring-base-line" id="permalinksFile" name="permalinks_file" accept=".xlsx,.xls,.csv" required>
    </div>
    <button type="submit" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-primary-line bg-primary text-primary-foreground hover:bg-primary-hover">Convert and Match</button>
  </form>

  <div class="app-hidden rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700" id="successMessage" role="alert">
    Excel file has been generated successfully!
  </div>

  <div class="app-hidden rounded-lg border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-700" id="errorAlert" role="alert"></div>
</div>

<div class="app-hidden fixed inset-0 bg-base/70 z-50" id="loadingSpinner">
  <div class="h-full flex items-center justify-center">
    <div class="bg-layer border border-layer-line rounded-lg p-5 text-center shadow-sm">
      <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-primary rounded-full mb-3"></div>
      <div class="text-sm text-muted-foreground">Converting to Excel...</div>
    </div>
  </div>
</div>

<script>
    document.getElementById('convertWordForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevent page refresh
        const formData = new FormData();
        const wordFile = document.getElementById('wordFile').files[0];
        const permalinksFile = document.getElementById('permalinksFile').files[0];
        formData.append('word_file', wordFile);
        formData.append('permalinks_file', permalinksFile);

        document.getElementById('loadingSpinner').classList.remove('app-hidden');

        try {
            const response = await fetch('/convert_word', {
                method: 'POST',
                body: formData,
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'An unknown error occurred');
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'courses.xlsx';
            a.click();
            window.URL.revokeObjectURL(url); // Clean up URL

            document.getElementById('successMessage').classList.remove('app-hidden');
            setTimeout(() => {
                document.getElementById('successMessage').classList.add('app-hidden');
            }, 5000);
        } catch (error) {
            document.getElementById('errorAlert').textContent = error.message;
            document.getElementById('errorAlert').classList.remove('app-hidden');
        } finally {
            document.getElementById('loadingSpinner').classList.add('app-hidden');
        }
    });
</script>
{% endblock %}
